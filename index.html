<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Album - Yuvraj</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main>
        <div class="hearts-container" id="heartsContainer"></div>
        <div id="message">
            <!-- Your message will appear here -->
        </div>
        
        <!-- Album Container -->
        <div class="album-container">
            <div class="album">
                <div class="page left-page" id="leftPage">
                    <div class="page-content">
                        <!-- Dynamic content will load here -->
                    </div>
                </div>
                <div class="page right-page" id="rightPage">
                    <div class="page-content">
                        <!-- Dynamic content will load here -->
                    </div>
                </div>
            </div>
            
            <div class="nav-buttons">
                <button class="nav-btn prev-btn" id="prevBtn">◀ Prev</button>
                <span class="page-number" id="pageNumber">Page 1 of 5</span>
                <button class="nav-btn next-btn" id="nextBtn">Next ▶</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
